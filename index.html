<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GPS観光案内</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>GPS観光案内</h1>

  <button onclick="startWatch()">位置監視開始</button>

  <div class="setting">
    <h3>案内開始距離設定</h3>

    <input
      type="range"
      id="distanceSlider"
      min="10"
      max="100"
      value="30"
      step="10"
    >

    <p>
      現在の案内距離:
      <span id="distanceValue">100</span> m
    </p>
  </div>

  <p id="status">待機中</p>

  <div id="map"></div>

  <script src="main.js"></script>

</body>
</html>
