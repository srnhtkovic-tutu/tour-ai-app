<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>観光AIガイド</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 20px;
    }
  </style>

</head>

<body>

  <h1>まちあるきAIガイド</h1>

  <div class="panel">

    <h3>案内開始距離</h3>

    <input
      type="range"
      id="distanceSlider"
      min="1000"
      max="10000"
      step="1000"
      value="5000"
    >

    <p>
      現在:
      <span id="distanceValue">5000</span>
      m
    </p>

  </div>

  <div class="panel">

    <p id="status">待機中</p>

    <p id="nearestSpot">
      最寄りスポット: なし
    </p>

    <p id="stayTime">
      滞在時間: 0秒
    </p>

  </div>

  <div id="map"></div>

  <div id="guidePanel"
     style="display:none">

  <h3 id="guideTitle"></h3>

  <p id="guideMessage"></p>

  <button id="detailBtn">
    詳しく聞く
  </button>

  <button id="goBtn">
    そこに行く
  </button>

  <button id="ignoreBtn">
    興味がない
  </button>

</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="main.js"></script>

</body>
</html>
