<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>まちあるきAIガイド</title>
  <link rel="stylesheet" href="style.css">

  <style>
    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 20px;
    }
  </style>

</head>

<body>

  <h1>まちあるきAIガイドver0.5</h1>

  <div id="startPanel">

    <h2>まちあるきAIガイドへようこそ！</h2>

    <p>

        近くのおすすめスポットをAIがご案内します。

    </p>

    <button id="startGuideBtn">

        ▶ ガイド開始

    </button>

</div>

  <div class="panel">

    <h3>案内開始距離</h3>

    <input
      type="range"
      id="distanceSlider"
      min="10"
      max="300"
      step="5"
      value="30"
    >

    <p>
      現在:
      <span id="distanceValue">30</span>
      m
    </p>

  </div>

  <div class="panel">

    <p id="status">待機中</p>

    <p id="nearestSpot">
      最寄りスポット: なし
    </p>

    <p id="stayTime">
      滞在時間: 0秒
    </p>

  </div>

  <div id="guidePanel">

    <!-- スポット情報 -->

    <div id="spotInfo">

        <img id="spotImage">

        <h2 id="guideTitle"></h2>

        <p id="guideMessage"></p>

        <button id="goBtn">
            🧭 行ってみる
        </button>

        <button id="ignoreBtn">
            ❌ ほかをみる
        </button>

    </div>

    <!-- 開閉ボタン -->

    <button id="toggleSpotBtn">

        ▲ スポット情報を閉じる

    </button>

    <hr>

    <!-- チャット履歴 -->

    <div id="chatHistory">

    </div>

    <!-- 入力エリア -->

    <div id="chatInput">

        <h3>

            💬 AIコンシェルジュ

        </h3>

        <p class="chatDescription">

            気になることを自由に質問してください。

        </p>

        <textarea

            id="question"

            rows="3"

            placeholder="例：御朱印はありますか？"

        ></textarea>

        <button id="sendBtn">

            💬 質問する

        </button>

    </div>

</div>

<button id="resumeBtn" style="display:none;">
    探索を再開
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="main.js"></script>

</body>
</html>
