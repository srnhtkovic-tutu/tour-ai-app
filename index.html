<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>まちあるきAIガイド</title>
  <link rel="stylesheet" href="style.css">

  <style>
    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 20px;
    }
  </style>

</head>

<body>

  <h1>まちあるきAIガイドver0.5</h1>

  <div class="panel">

    <h3>案内開始距離</h3>

    <input
      type="range"
      id="distanceSlider"
      min="10"
      max="100"
      step="10"
      value="30"
    >

    <p>
      現在:
      <span id="distanceValue">30</span>
      m
    </p>

  </div>

  <div class="panel">

    <p id="status">待機中</p>

    <p id="nearestSpot">
      最寄りスポット: なし
    </p>

    <p id="stayTime">
      滞在時間: 0秒
    </p>

  </div>

  <div id="guidePanel">

    <img id="spotImage">

    <h2 id="guideTitle"></h2>

    <div id="guideContent">

        <p id="guideMessage"></p>

    </div>
    <button id="toggleGuideBtn">

        ▲ 案内文を閉じる

    </button>

    <button id="goBtn">
        🧭 行ってみる
    </button>

    <button id="ignoreBtn">
        ➡ ほかをみる
    </button>

    <hr>

  <div id="chatArea">

  <h3>💬 AIコンシェルジュ</h3>

  <p class="chatDescription">
    お気軽に質問してください。
  </p>

  <!-- 会話履歴を先に置く -->
  <div id="chatHistory"></div>

  <!-- 入力エリアは一番下 -->
  <div id="chatInput">

    <textarea
      id="question"
      placeholder="例：このお寺はいつ建立されましたか？"
      rows="2">
    </textarea>

    <button id="sendBtn">
      💬 質問する
    </button>

  </div>

  </div>


</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="main.js"></script>

</body>
</html>
