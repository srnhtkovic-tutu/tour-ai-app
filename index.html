<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>まちあるきAIガイド</title>

  <style>
    body {
      font-family: sans-serif;
      font-size: 40px;
      padding: 20px;
    }

    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 80px;
      width: 100%;
      height: 40px;
    }
    #distanceSLider {
      width: 100%;
      height: 40px;
    }
  </style>
  
</head>

<body>

  <h1>まちあるきAIガイド</h1>

  <button onclick="startWatch()">
    位置監視開始
  </button>

  <div class="panel">

    <h3>案内開始距離</h3>

    <input
      type="range"
      id="distanceSlider"
      min="10"
      max="100"
      step="10"
      value="30"
    >

    <p>
      現在:
      <span id="distanceValue">30</span>
      m
    </p>

  </div>

  <div class="panel">

    <p id="status">待機中</p>

    <p id="nearestSpot">
      最寄りスポット: なし
    </p>

    <p id="stayTime">
      滞在時間: 0秒
    </p>

  </div>

  <div id="map"></div>

  <script src="main.js"></script>

</body>
</html>
