<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>観光AIガイド</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #map {
      width: 100%;
      height: 400px;
      background: #ddd;
      margin-top: 20px;
    }

    .setting {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 8px;
    }

    #distanceValue {
      font-weight: bold;
      color: blue;
      font-size: 20px;
    }
  </style>

</head>

<body>

  <h1>まちあるきAIガイド</h1>

  <div class="panel">

    <h3>案内開始距離</h3>

    <input
      type="range"
      id="distanceSlider"
      min="1000"
      max="10000"
      step="1000"
      value="5000"
    >

    <p>
      現在:
      <span id="distanceValue">5000</span>
      m
    </p>

  </div>

  <!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>まちあるきAIガイド</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <div id="status">
        GPS取得中...
    </div>

    <div id="nearestSpot">
        最寄りスポット
    </div>

    <div id="guidePanel">

        <h1 id="guideTitle">
            スポット名
        </h1>

        <div id="guideMessage">
            案内文がここに表示されます。
        </div>

        <button id="repeatBtn">
            🔊 もう一度聞く
        </button>

        <button id="goBtn">
            📍 行ってみる
        </button>

        <button id="ignoreBtn">
            ✖ 今回は案内しない
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="main.js"></script>

</body>
</html>



  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="main.js"></script>

</body>
</html>
